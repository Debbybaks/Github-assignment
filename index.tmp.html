<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amber &amp; Leaf — Shopping Cart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14211C;
    --surface:#1D2E27;
    --surface-alt:#24382F;
    --border:#3A4F44;
    --gold:#C9A24B;
    --gold-dim:#8C7638;
    --rust:#A8542E;
    --rust-bright:#C4693C;
    --text:#F1EAD9;
    --text-dim:#93A79A;
    --paper:#F1EAD9;
    --paper-shadow:#0000;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:48px 24px 80px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--border);
    padding-bottom:24px;
    margin-bottom:40px;
    flex-wrap:wrap;
    gap:16px;
  }
  .brand h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:34px;
    margin:0;
    letter-spacing:0.5px;
  }
  .brand h1 em{color:var(--gold);font-style:italic;font-weight:500;}
  .brand p{
    margin:4px 0 0;
    color:var(--text-dim);
    font-size:13px;
    letter-spacing:1.5px;
    text-transform:uppercase;
  }
  .catalog-search{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:6px;
    padding:10px 14px;
    min-width:240px;
  }
  .catalog-search input{
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    width:100%;
  }
  .catalog-search input::placeholder{color:var(--text-dim);}
  .catalog-search svg{flex-shrink:0;}

  .layout{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:40px;
    align-items:start;
  }

  .catalog-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
  }
  .tea-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .tea-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .swatch{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:6px;
  }
  .tea-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0;line-height:1.3;}
  .tea-origin{font-size:12px;color:var(--text-dim);margin:2px 0 0;}
  .tea-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
  .tea-price{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--gold);}
  .add-btn{
    background:var(--surface-alt);
    border:1px solid var(--gold-dim);
    color:var(--gold);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    padding:7px 12px;
    border-radius:5px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .add-btn:hover{background:var(--gold);color:#14211C;}
  .add-btn:active{transform:scale(0.96);}
  .empty-catalog{
    grid-column:1/-1;
    text-align:center;
    color:var(--text-dim);
    padding:40px 0;
    font-size:14px;
  }

  /* CART — receipt / ticket styling */
  .ticket{
    background:var(--paper);
    color:#22201A;
    border-radius:2px;
    position:relative;
    padding:26px 22px 20px;
    position:sticky;
    top:24px;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    left:0;right:0;
    height:10px;
    background:
      radial-gradient(circle at 8px 0, transparent 8px, var(--bg) 8.5px) repeat-x;
    background-size:16px 16px;
  }
  .ticket::before{top:-1px;transform:rotate(180deg);}
  .ticket::after{bottom:-1px;}

  .ticket-head{text-align:center;margin-bottom:14px;}
  .ticket-head h2{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    margin:0;
    letter-spacing:0.5px;
  }
  .ticket-head p{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:#6b6559;
    margin:4px 0 0;
  }

  .cart-search{
    display:flex;
    align-items:center;
    gap:6px;
    border:1px dashed #b9b09a;
    border-radius:4px;
    padding:8px 10px;
    margin-bottom:10px;
  }
  .cart-search input{
    border:none;background:transparent;outline:none;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;width:100%;color:#22201A;
  }
  .cart-search input::placeholder{color:#948c78;}

  .sort-row{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }
  .sort-btn{
    flex:1;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.5px;
    padding:7px 6px;
    border-radius:4px;
    border:1px solid #b9b09a;
    background:transparent;
    color:#4a4636;
    cursor:pointer;
    text-transform:uppercase;
  }
  .sort-btn.active{background:#22201A;color:var(--paper);border-color:#22201A;}

  .divider{border:none;border-top:1px dashed #b9b09a;margin:12px 0;}

  .cart-list{
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:40px;
  }
  .cart-empty{
    text-align:center;
    font-size:12.5px;
    color:#79725f;
    padding:18px 0;
    font-family:'Inter',sans-serif;
  }
  .cart-line{
    display:grid;
    grid-template-columns:1fr auto;
    gap:4px 10px;
    align-items:start;
  }
  .line-name{font-family:'Fraunces',serif;font-weight:600;font-size:14px;}
  .line-unit{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:#79725f;
    grid-column:1;
  }
  .line-total{
    font-family:'IBM Plex Mono',monospace;
    font-size:13.5px;
    text-align:right;
  }
  .qty-row{
    grid-column:1/-1;
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:2px;
  }
  .stepper{
    display:flex;
    align-items:center;
    border:1px solid #b9b09a;
    border-radius:4px;
    overflow:hidden;
  }
  .stepper button{
    width:22px;height:22px;
    border:none;
    background:transparent;
    cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:#22201A;
  }
  .stepper button:hover{background:#e6e0cf;}
  .stepper span{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    width:24px;
    text-align:center;
  }
  .remove-btn{
    margin-left:auto;
    background:none;
    border:none;
    color:var(--rust);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    cursor:pointer;
    padding:2px 4px;
  }
  .remove-btn:hover{color:var(--rust-bright);text-decoration:underline;}

  .totals{margin-top:14px;}
  .totals-row{
    display:flex;
    justify-content:space-between;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:#4a4636;
    margin-bottom:4px;
  }
  .totals-row.grand{
    font-size:17px;
    font-weight:600;
    color:#22201A;
    border-top:1px solid #b9b09a;
    padding-top:8px;
    margin-top:8px;
  }
  .checkout-btn{
    width:100%;
    margin-top:16px;
    padding:12px;
    background:#22201A;
    color:var(--paper);
    border:none;
    border-radius:4px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.5px;
    cursor:pointer;
  }
  .checkout-btn:hover{background:#3a3627;}
  .checkout-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .toast{
    text-align:center;
    font-size:11.5px;
    color:var(--gold-dim);
    margin-top:10px;
    min-height:14px;
    font-family:'IBM Plex Mono',monospace;
  }

  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
    .catalog-grid{grid-template-columns:1fr 1fr;}
    .ticket{position:static;}
  }
  @media (max-width:520px){
    .catalog-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1>Amber <em>&amp;</em> Leaf</h1>
      <p>Loose-leaf tea, sold by the ounce</p>
    </div>
    <div class="catalog-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#93A79A" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="catalogSearch" type="text" placeholder="Find a tea…" />
    </div>
  </header>

  <div class="layout">
    <section>
      <div id="catalogGrid" class="catalog-grid"></div>
    </section>

    <aside class="ticket">
      <div class="ticket-head">
        <h2>Your Basket</h2>
        <p id="ticketDate"></p>
      </div>

      <div class="cart-search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#948c78" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="cartSearch" type="text" placeholder="Search basket by name…" />
      </div>

      <div class="sort-row">
        <button class="sort-btn" id="sortAsc">Price ↑</button>
        <button class="sort-btn" id="sortDesc">Price ↓</button>
        <button class="sort-btn active" id="sortNone">Order added</button>
      </div>

      <hr class="divider" />

      <div id="cartList" class="cart-list"></div>

      <div class="totals">
        <hr class="divider" />
        <div class="totals-row"><span id="itemCount">0 items</span><span id="subtotal">$0.00</span></div>
        <div class="totals-row grand"><span>Total</span><span id="grandTotal">$0.00</span></div>
      </div>

      <button class="checkout-btn" id="checkoutBtn" disabled>Ready to brew</button>
      <div class="toast" id="toast"></div>
    </aside>
  </div>
</div>

<script>
/* ============================================================
   THE SHOPPING CART SYSTEM
   A small, self-contained class implementing the core
   operations of a shopping cart: add, remove, adjust quantity,
   compute totals, sort by price, and search by name.
   ============================================================ */
class ShoppingCart {
  constructor() {
    this._items = new Map(); // id -> { id, name, price, qty }
  }

  addItem(product, qty = 1) {
    const existing = this._items.get(product.id);
    if (existing) {
      existing.qty += qty;
    } else {
      this._items.set(product.id, { ...product, qty });
    }
    return this.getItems();
  }

  removeItem(id) {
    this._items.delete(id);
    return this.getItems();
  }

  setQuantity(id, qty) {
    if (qty <= 0) return this.removeItem(id);
    const item = this._items.get(id);
    if (item) item.qty = qty;
    return this.getItems();
  }

  incrementQuantity(id, delta) {
    const item = this._items.get(id);
    if (!item) return this.getItems();
    return this.setQuantity(id, item.qty + delta);
  }

  getItems() {
    return Array.from(this._items.values());
  }

  getItemCount() {
    return this.getItems().reduce((sum, i) => sum + i.qty, 0);
  }

  getTotal() {
    return this.getItems().reduce((sum, i) => sum + i.qty * i.price, 0);
  }

  sortByPrice(direction = 'asc') {
    const items = this.getItems();
    items.sort((a, b) => direction === 'asc' ? a.price - b.price : b.price - a.price);
    return items;
  }

  searchByName(query) {
    const q = query.trim().toLowerCase();
    if (!q) return this.getItems();
    return this.getItems().filter(i => i.name.toLowerCase().includes(q));
  }

  clear() {
    this._items.clear();
  }
}

/* ============================================================
   DEMO CATALOG + UI WIRING
   ============================================================ */
const CATALOG = [
  { id: 't1', name: 'Smoked Lapsang Souchong', origin: 'Wuyi Mountains, China', price: 8.50, color: '#7a4a2b' },
  { id: 't2', name: 'Jasmine Silver Needle', origin: 'Fujian, China', price: 12.00, color: '#d8c98a' },
  { id: 't3', name: 'Ceylon High Grown', origin: 'Nuwara Eliya, Sri Lanka', price: 6.75, color: '#b5482f' },
  { id: 't4', name: 'Genmaicha with Matcha', origin: 'Shizuoka, Japan', price: 7.25, color: '#7c9a4a' },
  { id: 't5', name: 'Rooibos Vanilla Bean', origin: 'Cederberg, South Africa', price: 5.50, color: '#c2632f' },
  { id: 't6', name: 'Wild Chamomile Blossom', origin: 'Nile Delta, Egypt', price: 6.00, color: '#e0b23c' },
  { id: 't7', name: 'Iron Goddess Oolong', origin: 'Anxi, China', price: 14.50, color: '#8a9a4a' },
  { id: 't8', name: 'Peppermint Leaf', origin: 'Willamette Valley, USA', price: 4.75, color: '#3f8a5c' },
];

const cart = new ShoppingCart();

let cartSortMode = 'none'; // 'none' | 'asc' | 'desc'
let cartQuery = '';
let catalogQuery = '';

const fmt = n => '$' + n.toFixed(2);

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 1800);
}

function renderCatalog() {
  const grid = document.getElementById('catalogGrid');
  const q = catalogQuery.trim().toLowerCase();
  const list = CATALOG.filter(p => p.name.toLowerCase().includes(q));

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-catalog">No teas match "${escapeHtml(catalogQuery)}".</div>`;
    return;
  }

  grid.innerHTML = list.map(p => `
    <div class="tea-card">
      <div class="tea-top">
        <div>
          <p class="tea-name">${escapeHtml(p.name)}</p>
          <p class="tea-origin">${escapeHtml(p.origin)}</p>
        </div>
        <span class="swatch" style="background:${p.color}"></span>
      </div>
      <div class="tea-bottom">
        <span class="tea-price">${fmt(p.price)}<span style="color:#93A79A;font-size:11px;"> /oz</span></span>
        <button class="add-btn" data-id="${p.id}">Add</button>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const product = CATALOG.find(p => p.id === btn.dataset.id);
      cart.addItem(product, 1);
      toast(`Added ${product.name}`);
      renderCart();
    });
  });
}

function getDisplayedCartItems() {
  let items;
  if (cartSortMode === 'asc') items = cart.sortByPrice('asc');
  else if (cartSortMode === 'desc') items = cart.sortByPrice('desc');
  else items = cart.getItems();

  if (cartQuery.trim()) {
    const q = cartQuery.trim().toLowerCase();
    items = items.filter(i => i.name.toLowerCase().includes(q));
  }
  return items;
}

function renderCart() {
  const list = document.getElementById('cartList');
  const items = getDisplayedCartItems();

  if (cart.getItems().length === 0) {
    list.innerHTML = `<div class="cart-empty">Your basket's empty — add a tea to get started.</div>`;
  } else if (items.length === 0) {
    list.innerHTML = `<div class="cart-empty">No items in your basket match "${escapeHtml(cartQuery)}".</div>`;
  } else {
    list.innerHTML = items.map(i => `
      <div class="cart-line" data-id="${i.id}">
        <p class="line-name">${escapeHtml(i.name)}</p>
        <p class="line-total">${fmt(i.price * i.qty)}</p>
        <p class="line-unit">${fmt(i.price)} / oz</p>
        <div></div>
        <div class="qty-row">
          <div class="stepper">
            <button class="qty-dec" aria-label="Decrease quantity">−</button>
            <span>${i.qty}</span>
            <button class="qty-inc" aria-label="Increase quantity">+</button>
          </div>
          <button class="remove-btn">Remove</button>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.cart-line').forEach(line => {
      const id = line.dataset.id;
      line.querySelector('.qty-inc').addEventListener('click', () => {
        cart.incrementQuantity(id, 1);
        renderCart();
      });
      line.querySelector('.qty-dec').addEventListener('click', () => {
        cart.incrementQuantity(id, -1);
        renderCart();
      });
      line.querySelector('.remove-btn').addEventListener('click', () => {
        const item = cart.getItems().find(i => i.id === id);
        cart.removeItem(id);
        toast(`Removed ${item ? item.name : 'item'}`);
        renderCart();
      });
    });
  }

  const count = cart.getItemCount();
  document.getElementById('itemCount').textContent = `${count} item${count === 1 ? '' : 's'}`;
  document.getElementById('subtotal').textContent = fmt(cart.getTotal());
  document.getElementById('grandTotal').textContent = fmt(cart.getTotal());
  document.getElementById('checkoutBtn').disabled = count === 0;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('catalogSearch').addEventListener('input', e => {
  catalogQuery = e.target.value;
  renderCatalog();
});

document.getElementById('cartSearch').addEventListener('input', e => {
  cartQuery = e.target.value;
  renderCart();
});

function setSortMode(mode) {
  cartSortMode = mode;
  ['sortAsc', 'sortDesc', 'sortNone'].forEach(id => document.getElementById(id).classList.remove('active'));
  const target = mode === 'asc' ? 'sortAsc' : mode === 'desc' ? 'sortDesc' : 'sortNone';
  document.getElementById(target).classList.add('active');
  renderCart();
}
document.getElementById('sortAsc').addEventListener('click', () => setSortMode('asc'));
document.getElementById('sortDesc').addEventListener('click', () => setSortMode('desc'));
document.getElementById('sortNone').addEventListener('click', () => setSortMode('none'));

document.getElementById('checkoutBtn').addEventListener('click', () => {
  toast('Order sent to the kettle 🍵'.replace(' 🍵',''));
  cart.clear();
  renderCart();
});

document.getElementById('ticketDate').textContent = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });

renderCatalog();
renderCart();
</script>
</body>
</html>
